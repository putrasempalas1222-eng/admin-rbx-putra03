<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX-ADMIN | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(circle at 100% 0%, rgba(220, 38, 38, 0.08) 0, transparent 40%);
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.3); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .admin-input {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 16px 20px;
            border-radius: 1.25rem;
            width: 100%;
            outline: none;
            font-size: 14px;
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .admin-input:focus {
            border-color: #ef4444 !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.15);
            transform: translateY(-2px);
        }
        .btn-core {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease;
        }
        .btn-core:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .input-container { position: relative; width: 100%; }
        .input-unit {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            font-size: 10px; font-weight: 800; color: #ef4444; letter-spacing: 0.1em; pointer-events: none;
        }
        .item-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.4s ease;
        }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-item { transition: all 0.3s ease; border-radius: 1rem; cursor: pointer; }
        .sidebar-item.active { background: rgba(220, 38, 38, 0.1); color: #ef4444; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        .btn-edit { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <div class="lg:hidden w-full p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#020617]/80 backdrop-blur-md z-50">
        <div class="text-2xl font-black tracking-tighter italic text-white uppercase">CORE<span class="text-red-600">ADMIN</span></div>
        <button onclick="toggleSidebar()" class="p-2 bg-red-600/10 rounded-xl text-red-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#020617] border-r border-white/5 p-10 flex flex-col z-[60] -translate-x-full lg:translate-x-0 lg:sticky lg:h-screen">
        <div class="text-3xl font-black mb-16 tracking-tighter italic text-white">CORE<span class="text-red-600">.</span></div>
        <nav class="flex-1 space-y-4">
            <div onclick="showPage('queue')" id="nav-queue" class="sidebar-item active p-4 text-xs font-black text-slate-400 flex items-center gap-4">
                <div class="w-1.5 h-1.5 rounded-full bg-red-600 shadow-[0_0_8px_#ef4444]"></div> LIVE QUEUE
            </div>
            <div onclick="showPage('manage')" id="nav-manage" class="sidebar-item p-4 text-xs font-black text-slate-400 flex items-center gap-4">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div> MANAGEMENT
            </div>
        </nav>
        <div class="mt-auto border-t border-white/5 pt-8 text-center lg:text-left">
            <div class="flex items-center gap-3 bg-red-600/10 border border-red-600/20 p-4 rounded-2xl">
                <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                <span class="text-[10px] font-black text-red-500 tracking-widest uppercase">System Secure</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-6 lg:p-20 overflow-x-hidden">
        <section id="page-queue">
            <header class="mb-12">
                <h1 class="text-5xl font-black mb-4 tracking-tighter text-white uppercase italic">Live Queue</h1>
                <p class="text-slate-500 text-sm font-medium tracking-wide uppercase tracking-[0.2em]">Monitoring Order Real-time</p>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="list-active"></div>
        </section>

        <section id="page-manage" class="hidden">
            <header class="mb-12">
                <h1 class="text-5xl font-black mb-4 tracking-tighter italic text-red-600 uppercase">Management</h1>
                <p class="text-slate-500 text-sm font-medium tracking-widest uppercase tracking-[0.2em]">Inventory Control</p>
            </header>
            <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
                <div class="xl:col-span-4 space-y-10">
                    <div class="glass-card p-8 rounded-[2.5rem]">
                        <h3 class="text-[10px] font-black text-red-500 uppercase tracking-[0.3em] italic mb-6">Inventory</h3>
                        <div class="input-container mb-4">
                            <input type="text" id="stok_val" placeholder="Total Robux" class="admin-input" oninput="formatIDR(this)">
                            <span class="input-unit uppercase">Robux TOTAL</span>
                        </div>
                        <button onclick="updateStok()" class="btn-core w-full py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] text-white">Sync Stock</button>
                    </div>
                    <div class="glass-card p-8 rounded-[2.5rem]">
                        <h3 id="form-title" class="text-[10px] font-black text-red-500 uppercase tracking-[0.3em] italic mb-6">Create New Packet</h3>
                        <div class="space-y-4">
                            <input type="hidden" id="edit-key">
                            <div class="input-container">
                                <input type="text" id="p_nama" placeholder="Quantity" class="admin-input" oninput="formatIDR(this)">
                                <span class="input-unit">ROBUX</span>
                            </div>
                            <div class="input-container">
                                <input type="text" id="p_harga" placeholder="Price" class="admin-input" oninput="formatIDR(this)">
                                <span class="input-unit uppercase">Rp (IDR)</span>
                            </div>
                            <button id="btn-submit-p" onclick="tambahP()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] transition hover:bg-slate-200">Deploy Packet</button>
                            <button id="btn-cancel-edit" onclick="resetForm()" class="hidden w-full bg-slate-800 text-slate-400 py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] mt-2">Cancel Edit</button>
                        </div>
                    </div>
                </div>
                <div class="xl:col-span-8">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-xl font-black italic uppercase text-white underline decoration-red-600 decoration-4">Active Items</h3>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-white" id="item-count">0 Items</span>
                    </div>
                    <div id="list-p-admin" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgDG1pbpT-eB8RR_gPGs1EfZR9Sfczzfc",
            authDomain: "cute-temanmu.firebaseapp.com",
            databaseURL: "https://cute-temanmu-default-rtdb.firebaseio.com",
            projectId: "cute-temanmu",
            storageBucket: "cute-temanmu.appspot.com",
            messagingSenderId: "356926981274",
            appId: "1:356926981274:web:f7ffb5817dfe5c74a4cb23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- WEBHOOK CONFIG ---
        // Ganti dengan URL Webhook Discord yang bisa dilihat oleh User/Publik
        const DISCORD_USER_NOTIF_WEBHOOK = "https://discord.com/api/webhooks/1466102748331245568/innFCGbR6TPdicNfmcbcrTP8sJ7VVs6O0oAl3bfWeu3LCNlxBFP3jsdxWsgVOx8pL1PL"; 

        window.formatIDR = (input) => {
            let value = input.value.replace(/\D/g, "");
            if (value !== "") input.value = parseInt(value).toLocaleString("id-ID");
        };

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');
        window.showPage = (page) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById(`nav-${page}`).classList.add('active');
            if(window.innerWidth < 1024) toggleSidebar();
        };

        // --- WEBHOOK UNTUK NOTIFIKASI USER ---
        async function sendUserProcessedWebhook(roblox, discordTag, produk) {
            const embed = {
                title: "🚀 PESANAN SELESAI DIPROSES",
                color: 5763719, // Hijau Cerah
                description: `Halo **${discordTag}**, pesanan kamu telah berhasil dikirim!`,
                fields: [
                    { name: "🎮 Akun Roblox", value: `\`${roblox}\``, inline: true },
                    { name: "📦 Produk", value: `\`${produk}\``, inline: true },
                    { name: "✨ Status", value: "✅ **SUCCESSFULLY DELIVERED**", inline: false }
                ],
                footer: { text: "RBX-STORE | Terimakasih telah berbelanja!" },
                timestamp: new Date()
            };

            try {
                await fetch(DISCORD_USER_NOTIF_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        content: `📢 Notifikasi untuk ${discordTag}`, // Pesan teks biasa (bisa mention jika pakai ID)
                        embeds: [embed] 
                    })
                });
            } catch (e) { console.error("Webhook Error:", e); }
        }

        // --- AUTO-CUT STOCK ACC SYSTEM ---
        window.acc = async (orderId, produkText, robloxName, discordTag) => {
            if(!confirm(`Authorize ACC untuk ${robloxName}? Stok terpotong otomatis.`)) return;

            try {
                // Parse Robux Amount
                const robuxToMinus = parseInt(produkText.split(' ')[0].replace(/\./g, ''));
                const stokRef = ref(db, 'stok_robux');
                const stokSnap = await get(stokRef);
                const currentStok = stokSnap.val() || 0;
                const newStok = currentStok - robuxToMinus;

                if (newStok < 0) return alert("GAGAL: Stok Gudang tidak cukup!");

                // 1. Update Stok Database
                await set(stokRef, newStok);

                // 2. Pindahkan ke Riwayat & Hapus Antrean Aktif
                const time = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                await push(ref(db, `riwayat/${orderId}`), { 
                    produk: produkText, 
                    time: time, 
                    roblox: robloxName 
                });
                await remove(ref(db, `orders_active/${orderId}`));

                // 3. Kirim Webhook Notifikasi ke User
                await sendUserProcessedWebhook(robloxName, discordTag, produkText);

                alert(`SUCCESS: Transaksi ${robloxName} selesai.`);
            } catch (e) { alert("Sistem Error: " + e.message); }
        };

        // Queue Monitor
        onValue(ref(db, 'orders_active'), (snap) => {
            const list = document.getElementById('list-active');
            list.innerHTML = "";
            if(!snap.exists()) {
                list.innerHTML = "<div class='text-slate-600 text-[10px] uppercase font-bold tracking-widest p-10 glass-card rounded-[2rem] text-center col-span-full'>No Pending Orders</div>";
                return;
            }
            snap.forEach(c => {
                const d = c.val();
                list.innerHTML += `
                    <div class="glass-card p-8 rounded-[2.5rem] border-l-4 border-red-600 group">
                        <div class="mb-6">
                            <div class="text-[9px] font-black text-red-500 tracking-[0.2em] uppercase mb-1 italic">Target User</div>
                            <div class="text-2xl font-black text-white italic tracking-tighter truncate">${d.roblox}</div>
                            <div class="text-[10px] text-slate-400 font-black tracking-widest uppercase italic">${d.discord || 'N/A'}</div>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl mb-6 text-white font-black italic text-sm border border-white/5 uppercase">
                            ${d.produk}
                        </div>
                        <button onclick="acc('${c.key}', '${d.produk}', '${d.roblox}', '${d.discord}')" class="w-full btn-core py-4 rounded-xl font-black text-[10px] uppercase tracking-widest text-white shadow-lg">Authorize & Cut Stock</button>
                    </div>`;
            });
        });

        // (Fungsi updateStok, tambahP, prepareEdit, dan onValue produk tetap sama seperti sebelumnya...)
        window.updateStok = () => {
            const val = document.getElementById('stok_val').value.replace(/\./g, "");
            if(!val) return;
            set(ref(db, 'stok_robux'), parseInt(val));
            alert("Inventory Synchronized!");
            document.getElementById('stok_val').value = "";
        };

        window.tambahP = async () => {
            const n = document.getElementById('p_nama').value; 
            const h = document.getElementById('p_harga').value; 
            const editKey = document.getElementById('edit-key').value;
            if(!n || !h) return;
            const data = { amount: n, price: h, display: `${n} Robux — Rp ${h}` };
            if(editKey) { await update(ref(db, `produk/${editKey}`), data); } 
            else { await push(ref(db, 'produk'), data); }
            resetForm();
        };

        window.resetForm = () => {
            document.getElementById('edit-key').value = "";
            document.getElementById('p_nama').value = "";
            document.getElementById('p_harga').value = "";
            document.getElementById('btn-submit-p').innerText = "Deploy Packet";
            document.getElementById('form-title').innerText = "Create New Packet";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        };

        window.prepareEdit = (key, amount, price) => {
            document.getElementById('edit-key').value = key;
            document.getElementById('p_nama').value = amount;
            document.getElementById('p_harga').value = price;
            document.getElementById('btn-submit-p').innerText = "Update Packet";
            document.getElementById('form-title').innerText = "Edit Existing Packet";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            document.getElementById('p_nama').focus();
        };

        onValue(ref(db, 'produk'), (snap) => {
            const list = document.getElementById('list-p-admin');
            const countLabel = document.getElementById('item-count');
            list.innerHTML = "";
            let count = 0;
            if(snap.exists()) {
                snap.forEach(c => {
                    count++;
                    const item = c.val();
                    list.innerHTML += `
                        <div class="item-card p-6 rounded-[2rem] flex flex-col justify-between relative overflow-hidden group border border-white/5 hover:border-red-500/30 transition-all">
                            <div>
                                <div class="text-[10px] font-black text-red-500 tracking-widest uppercase mb-1 italic">Active Packet</div>
                                <h4 class="text-xl font-black text-white italic tracking-tighter mb-4">${item.amount} ROBUX</h4>
                            </div>
                            <div class="flex flex-col gap-2 mt-4 pt-4 border-t border-white/5">
                                <span class="text-sm font-black text-white tracking-tight italic">Rp ${item.price}</span>
                                <div class="flex gap-2">
                                    <button onclick="prepareEdit('${c.key}', '${item.amount}', '${item.price}')" class="flex-1 btn-edit py-2 rounded-xl text-[9px] font-black tracking-widest uppercase transition-all">Edit</button>
                                    <button onclick="hapus('${c.key}')" class="flex-1 bg-red-600/10 hover:bg-red-600 hover:text-white text-red-500 py-2 rounded-xl text-[9px] font-black tracking-widest uppercase transition-all">Del</button>
                                </div>
                            </div>
                        </div>`;
                });
            }
            countLabel.innerText = `${count} Items Deployed`;
        });

        window.hapus = (key) => confirm("Hapus?") && remove(ref(db, `produk/${key}`));
    </script>
</body>
</html>
