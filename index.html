<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX-ADMIN | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(circle at 100% 0%, rgba(220, 38, 38, 0.08) 0, transparent 40%);
            min-height: 100vh; margin: 0;
            overflow-x: hidden;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .admin-input {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 16px 20px; border-radius: 1.25rem; width: 100%;
            outline: none; font-size: 14px; color: white; transition: 0.4s ease;
        }
        .admin-input:focus { border-color: #ef4444 !important; box-shadow: 0 0 25px rgba(239, 68, 68, 0.15); transform: translateY(-2px); }
        .btn-core {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease; color: white;
        }
        .btn-core:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-reject {
            background: rgba(239, 68, 68, 0.1); color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2); transition: 0.3s;
        }
        .btn-reject:hover { background: #ef4444; color: white; }
        .item-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03); transition: 0.4s;
        }
        .sidebar-item { transition: 0.3s; border-radius: 1rem; cursor: pointer; }
        .sidebar-item.active { background: rgba(220, 38, 38, 0.1); color: #ef4444; }
        .input-unit { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 800; color: #ef4444; pointer-events: none; }
        
        #login-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: #020617;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <div id="login-overlay">
        <div class="glass-card p-10 rounded-[3rem] w-full max-w-md border-t-4 border-red-600">
            <div class="text-center mb-8">
                <div class="text-3xl font-black tracking-tighter italic text-white uppercase mb-2">CORE<span class="text-red-600">AUTH</span></div>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Restricted Administrator Access</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-red-500 uppercase ml-4 mb-2 block italic">Username</label>
                    <input type="text" id="admin-user" placeholder="Enter Username" class="admin-input">
                </div>
                <div>
                    <label class="text-[9px] font-black text-red-500 uppercase ml-4 mb-2 block italic">Access Key</label>
                    <input type="password" id="admin-pass" placeholder="••••••••" class="admin-input">
                </div>
                <button onclick="attemptLogin()" class="btn-core w-full py-5 rounded-2xl font-black text-xs uppercase mt-4 tracking-widest">Identify Session</button>
            </div>
        </div>
    </div>

    <div id="admin-content" class="hidden flex flex-col lg:flex-row w-full">
        <div class="lg:hidden w-full p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-[#020617]/80 backdrop-blur-md z-50">
            <div class="text-2xl font-black tracking-tighter italic text-white uppercase">CORE<span class="text-red-600">ADMIN</span></div>
            <button onclick="toggleSidebar()" class="p-2 bg-red-600/10 rounded-xl text-red-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#020617] border-r border-white/5 p-10 flex flex-col z-[60] -translate-x-full lg:translate-x-0 lg:sticky lg:h-screen">
            <div class="text-3xl font-black mb-16 tracking-tighter italic text-white uppercase">CORE<span class="text-red-600">.</span></div>
            <nav class="flex-1 space-y-4 text-left">
                <div onclick="showPage('queue')" id="nav-queue" class="sidebar-item active p-4 text-xs font-black text-slate-400 flex items-center gap-4 uppercase"><div class="w-2 h-2 rounded-full bg-red-600"></div> Live Queue</div>
                <div onclick="showPage('manage')" id="nav-manage" class="sidebar-item p-4 text-xs font-black text-slate-400 flex items-center gap-4 uppercase"><div class="w-2 h-2 rounded-full bg-slate-700"></div> Management</div>
            </nav>
            <div class="mt-auto border-t border-white/5 pt-8">
                <button onclick="logout()" class="w-full text-left p-4 text-[10px] font-black text-slate-500 uppercase hover:text-red-500 transition">Terminate Session</button>
                <div class="flex items-center gap-3 bg-red-600/10 p-4 rounded-2xl mt-4">
                    <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                    <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">System Secure</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-20 overflow-x-hidden">
            <section id="page-queue">
                <h1 class="text-5xl font-black mb-12 italic uppercase text-white tracking-tighter">Live Queue</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="list-active"></div>
            </section>

            <section id="page-manage" class="hidden">
                <h1 class="text-5xl font-black mb-12 italic text-red-600 uppercase tracking-tighter">Management</h1>
                <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
                    <div class="xl:col-span-4 space-y-10">
                        <div class="glass-card p-8 rounded-[2.5rem]">
                            <h3 class="text-[10px] font-black text-red-500 uppercase mb-6 italic">Inventory Robux</h3>
                            <div class="relative mb-4"><input type="text" id="stok_val" placeholder="Total Robux" class="admin-input" oninput="formatIDR(this)"><span class="input-unit">R$ TOTAL</span></div>
                            <button onclick="updateStok()" class="btn-core w-full py-4 rounded-xl font-black text-[10px] uppercase">Sync Stock</button>
                        </div>

                        <div class="glass-card p-8 rounded-[2.5rem]">
                            <h3 id="form-title" class="text-[10px] font-black text-red-500 uppercase mb-6">Deploy Product</h3>
                            <div class="space-y-4">
                                <input type="hidden" id="edit-key">
                                <select id="p_type" class="admin-input cursor-pointer appearance-none font-bold">
                                    <option value="Robux">Robux (Auto Cut)</option>
                                    <option value="Gamepass">Gamepass / Items</option>
                                </select>
                                <input type="text" id="p_nama" placeholder="Product Name (ex: 1.000 / Blade)" class="admin-input font-bold uppercase">
                                <div class="relative"><input type="text" id="p_harga" placeholder="Price" class="admin-input" oninput="formatIDR(this)"><span class="input-unit">Rp</span></div>
                                <button id="btn-submit-p" onclick="tambahP()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase italic">Deploy</button>
                                <button id="btn-cancel-edit" onclick="resetForm()" class="hidden w-full bg-slate-800 text-slate-400 py-4 rounded-xl font-black text-[10px] mt-2">Cancel</button>
                            </div>
                        </div>
                    </div>
                    <div class="xl:col-span-8">
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-xl font-black italic uppercase text-white underline decoration-red-600 decoration-4">Catalog</h3>
                            <span class="text-[10px] font-bold text-white uppercase tracking-widest" id="item-count">0 Items</span>
                        </div>
                        <div id="list-p-admin" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- AUTH SYSTEM ---
        const ADMIN_CRED = { u: "putragacorbae", p: "?admintopup031104" };

        function checkAuth() {
            if (sessionStorage.getItem('admin_auth') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').classList.remove('hidden');
            }
        }

        window.attemptLogin = () => {
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            if (u === ADMIN_CRED.u && p === ADMIN_CRED.p) {
                sessionStorage.setItem('admin_auth', 'true');
                alert("Login Berhasil!");
                checkAuth();
            } else {
                alert("Akses Ditolak: Kredensial Salah!");
                document.getElementById('admin-pass').value = "";
            }
        };

        window.logout = () => {
            sessionStorage.removeItem('admin_auth');
            location.reload();
        };

        checkAuth();

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyBgDG1pbpT-eB8RR_gPGs1EfZR9Sfczzfc",
            authDomain: "cute-temanmu.firebaseapp.com",
            databaseURL: "https://cute-temanmu-default-rtdb.firebaseio.com",
            projectId: "cute-temanmu",
            storageBucket: "cute-temanmu.appspot.com",
            messagingSenderId: "356926981274",
            appId: "1:356926981274:web:f7ffb5817dfe5c74a4cb23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const WEBHOOK = "https://discord.com/api/webhooks/1473231285924265994/pWp8ggIvgfzoZwFPnudv5z6m354LGUrUcIwVPmLptP3fO7BB74j2fhXN0Jv7zi5eki3R";

        // --- UTILS ---
        window.formatIDR = (i) => { let v = i.value.replace(/\D/g, ""); if (v !== "") i.value = parseInt(v).toLocaleString("id-ID"); };
        window.showPage = (p) => { document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden')); document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active')); document.getElementById(`page-${p}`).classList.remove('hidden'); document.getElementById(`nav-${p}`).classList.add('active'); if(window.innerWidth < 1024) toggleSidebar(); };
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');

        // --- DATABASE ACTIONS ---
        window.acc = async (orderKey, prod, rob, disc, type, uid) => {
            if(!confirm(`Terima pesanan ${rob}?`)) return;
            try {
                if(type === 'Robux') {
                    const minus = parseInt(prod.split(' ')[0].replace(/\./g, ''));
                    const sRef = ref(db, 'stok_robux'); const snap = await get(sRef);
                    const curr = snap.val() || 0; if (curr < minus) return alert("Stok Robux Tidak Cukup!");
                    await set(sRef, curr - minus);
                }
                await push(ref(db, `notif_popup/${uid}`), { type: 'success', title: 'ORDER SUCCESS', msg: `Selamat! Pesanan ${prod} Anda telah berhasil dikirim oleh Admin.` });
                const time = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                await push(ref(db, `riwayat/${uid}`), { produk: prod, time: time, roblox: rob, status: 'success' });
                await remove(ref(db, `orders_active/${uid}`));
                
                const embed = {
                    title: "OFFICIAL RECEIPT - SUCCESS", color: 5763719, description: "Transaksi telah berhasil diproses secara otomatis oleh sistem.",
                    fields: [
                        { name: "📋 NOMOR INVOICE", value: `\`INV-${uid.substring(0,6).toUpperCase()}\``, inline: true },
                        { name: "⏰ WAKTU SELESAI", value: time, inline: true },
                        { name: "🎮 USERNAME ROBLOX", value: `**${rob}**`, inline: false },
                        { name: "📦 DETAIL ITEM", value: `\`${prod}\``, inline: false }
                    ],
                    footer: { text: "RBX-STORE Digital Struk System" }, timestamp: new Date()
                };
                await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: `**PESANAN SELESAI!** Pelanggan: **${disc}** @everyone`, embeds: [embed] }) });
                alert("Pesanan Berhasil di ACC!");
            } catch (e) { alert(e.message); }
        };

        window.reject = async (orderKey, prod, rob, disc, uid) => {
            const reason = prompt(`Alasan tolak ${rob}:`, "Bukti transfer tidak valid / Belum masuk");
            if(reason === null) return;
            try {
                await push(ref(db, `notif_popup/${uid}`), { type: 'error', title: 'ORDER REJECTED', msg: `Maaf, pesanan ${prod} Anda ditolak. Alasan: ${reason}` });
                const time = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                await push(ref(db, `riwayat/${uid}`), { produk: prod, time: time, roblox: rob, status: 'failed', reason: reason });
                await remove(ref(db, `orders_active/${uid}`));

                const embed = {
                    title: "TRANSACTION REJECTED", color: 15548997, description: "Mohon maaf, pesanan Anda tidak dapat kami proses saat ini.",
                    fields: [
                        { name: "📋 NOMOR INVOICE", value: `\`INV-${uid.substring(0,6).toUpperCase()}\``, inline: true },
                        { name: "🎮 USERNAME", value: `**${rob}**`, inline: false },
                        { name: "⚠️ ALASAN PENOLAKAN", value: `**${reason}**`, inline: false }
                    ],
                    footer: { text: "Hubungi Admin untuk klarifikasi." }, timestamp: new Date()
                };
                await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: `**PESANAN DITOLAK!** Pelanggan: **${disc}** @everyone`, embeds: [embed] }) });
                alert("Pesanan Berhasil Ditolak!");
            } catch (e) { alert(e.message); }
        };

        onValue(ref(db, 'orders_active'), (snap) => {
            const list = document.getElementById('list-active'); list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = "<div class='col-span-full glass-card p-16 text-center opacity-40 uppercase font-black italic'>Antrean Kosong</div>"; return; }
            snap.forEach(c => {
                const d = c.val();
                list.innerHTML += `
                    <div class="glass-card p-8 rounded-[2.5rem] border-l-4 border-red-600">
                        <div class="text-[9px] font-black text-red-500 uppercase italic">Target User</div>
                        <div class="text-2xl font-black text-white italic truncate">${d.roblox}</div>
                        <div class="bg-white/5 p-4 rounded-2xl mb-6 text-white font-black text-sm uppercase border border-white/5 italic">${d.produk}</div>
                        <div class="flex gap-2">
                            <button onclick="acc('${c.key}', '${d.produk}', '${d.roblox}', '${d.discord}', '${d.type}', '${d.uid}')" class="flex-[2] btn-core py-4 rounded-xl font-black text-[10px] uppercase">ACC</button>
                            <button onclick="reject('${c.key}', '${d.produk}', '${d.roblox}', '${d.discord}', '${d.uid}')" class="flex-1 btn-reject py-4 rounded-xl font-black text-[10px] uppercase">REJECT</button>
                        </div>
                    </div>`;
            });
        });

        window.updateStok = () => { let v = document.getElementById('stok_val').value.replace(/\./g, ""); if(v) set(ref(db, 'stok_robux'), parseInt(v)).then(() => alert("Stok Sync!")); };
        window.tambahP = async () => { 
            const n = document.getElementById('p_nama').value, h = document.getElementById('p_harga').value, t = document.getElementById('p_type').value, ek = document.getElementById('edit-key').value; 
            if(!n || !h) return; 
            const data = { amount: n, price: h, type: t, display: t === 'Robux' ? `${n} Robux — Rp ${h}` : `${n} — Rp ${h}` }; 
            if(ek) await update(ref(db, `produk/${ek}`), data); else await push(ref(db, 'produk'), data); 
            resetForm(); 
        };
        window.resetForm = () => { document.getElementById('edit-key').value = ""; document.getElementById('p_nama').value = ""; document.getElementById('p_harga').value = ""; document.getElementById('btn-submit-p').innerText = "DEPLOY"; document.getElementById('btn-cancel-edit').classList.add('hidden'); };
        window.prepareEdit = (k, a, p, t) => { document.getElementById('edit-key').value = k; document.getElementById('p_nama').value = a; document.getElementById('p_harga').value = p; document.getElementById('p_type').value = t; document.getElementById('btn-submit-p').innerText = "UPDATE"; document.getElementById('btn-cancel-edit').classList.remove('hidden'); };

        onValue(ref(db, 'produk'), (snap) => {
            const list = document.getElementById('list-p-admin'); let count = 0; list.innerHTML = "";
            snap.forEach(c => { count++; const i = c.val(); list.innerHTML += `<div class="item-card p-6 rounded-[2rem] border border-white/5 flex flex-col justify-between"><div><div class="text-[9px] font-black text-red-500 uppercase italic">${i.type}</div><h4 class="text-xl font-black text-white italic mb-4 uppercase">${i.amount}</h4></div><div class="flex gap-2"><button onclick="prepareEdit('${c.key}', '${i.amount}', '${i.price}', '${i.type}')" class="flex-1 bg-blue-600/10 text-blue-500 py-2 rounded-lg text-[9px] font-black uppercase">Edit</button><button onclick="hapus('${c.key}')" class="flex-1 bg-red-600/10 text-red-500 py-2 rounded-lg text-[9px] font-black uppercase">Del</button></div></div>`; });
            document.getElementById('item-count').innerText = `${count} Items`;
        });
        window.hapus = (k) => confirm("Hapus?") && remove(ref(db, `produk/${k}`));
    </script>
</body>
</html>
